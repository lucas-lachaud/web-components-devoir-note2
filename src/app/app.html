<h1>Gestion des utilisateurs</h1>

<app-presenter-panel [users]="users" (presenterChanged)="onPresenterChanged($event)"></app-presenter-panel>

<section class="user-list">
  @for (user of users; track user.prenom + user.nom) {
  <app-user-card [prenom]="user.prenom" [nom]="user.nom" [age]="user.age" [os]="user.os" [present]="user.present"
    (presenceToggled)="togglePresence($event)"></app-user-card>
  }
</section>

<app-stats-panel [users]="users"></app-stats-panel>
